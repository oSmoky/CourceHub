services:
  - type: web
    name: courcehub
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/init_db.py && python scripts/seed.py && python scripts/set_webhook.py && gunicorn --bind 0.0.0.0:$PORT run:app
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: coursehub-db
          property: connectionString
      - key: TELEGRAM_BOT_TOKEN
        value: 8740701480:AAHV9akw5_rj0wxs8jVHRXVGo18Sa3XEJEM
      - key: PUBLIC_BASE_URL
        value: https://courcehub.onrender.com
      - key: TELEGRAM_WEB_APP_URL
        value: https://courcehub.onrender.com/telegram/
      - key: TELEGRAM_WEBHOOK_SECRET
        value: coursehub-platform-webhook
      - key: TELEGRAM_WEBHOOK_URL
        value: https://courcehub.onrender.com/telegram/webhook/coursehub-platform-webhook

  - type: worker
    name: coursehub-bot
    runtime: python
    plan: starter
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/set_webhook.py && python -c "import time; time.sleep(31536000)"
    envVars:
      - key: SECRET_KEY
        fromService:
          name: courcehub
          type: web
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: coursehub-db
          property: connectionString
      - key: TELEGRAM_BOT_TOKEN
        value: 8740701480:AAHV9akw5_rj0wxs8jVHRXVGo18Sa3XEJEM
      - key: PUBLIC_BASE_URL
        value: https://courcehub.onrender.com
      - key: TELEGRAM_WEB_APP_URL
        value: https://courcehub.onrender.com/telegram/
      - key: TELEGRAM_WEBHOOK_SECRET
        value: coursehub-platform-webhook
      - key: TELEGRAM_WEBHOOK_URL
        value: https://courcehub.onrender.com/telegram/webhook/coursehub-platform-webhook

databases:
  - name: coursehub-db
    region: frankfurt
    databaseName: coursehub
    user: coursehub
