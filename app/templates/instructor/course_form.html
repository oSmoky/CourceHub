{% extends "base.html" %}

{% block title %}{% if course %}Edit Course{% else %}New Course{% endif %} - CourseHub{% endblock %}

{% block content %}
<div class="content-shell">
    <h1 class="h3 mb-3">{% if course %}Edit Course{% else %}New Course{% endif %}</h1>
    <form method="post" class="form-panel">
        <div class="mb-3">
            <label for="title" class="form-label">Title</label>
            <input id="title" name="title" class="form-control" value="{{ course.title if course else '' }}" required maxlength="150">
        </div>
        <div class="mb-3">
            <label for="description" class="form-label">Description</label>
            <textarea id="description" name="description" class="form-control" rows="5" required>{{ course.description if course else '' }}</textarea>
        </div>
        <div class="mb-3">
            <label for="level" class="form-label">Level</label>
            {% set current_level = course.level if course else 'Beginner' %}
            <select id="level" name="level" class="form-select">
                <option value="Beginner" {% if current_level == 'Beginner' %}selected{% endif %}>Beginner</option>
                <option value="Intermediate" {% if current_level == 'Intermediate' %}selected{% endif %}>Intermediate</option>
                <option value="Advanced" {% if current_level == 'Advanced' %}selected{% endif %}>Advanced</option>
            </select>
        </div>
        <div class="d-flex gap-2">
            <button class="btn btn-primary" type="submit">Save</button>
            <a class="btn btn-outline-secondary" href="{{ url_for('instructor.dashboard') }}">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
