{% extends "auth/base.html" %}

{% block title %}Register - CourseHub{% endblock %}

{% block content %}
<div class="auth-copy">
    <h1 id="auth-title">Create Account</h1>
    <p>Create your CourseHub profile before opening the course workspace.</p>
</div>

<form method="post" class="auth-form">
    <div class="mb-3">
        <label for="name" class="form-label">Full Name</label>
        <input id="name" name="name" class="form-control" required maxlength="100" autofocus autocomplete="name">
    </div>
    <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input id="email" name="email" type="email" class="form-control" required maxlength="120" autocomplete="email">
    </div>
    <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input id="password" name="password" type="password" class="form-control" required autocomplete="new-password">
    </div>
    <div class="mb-3">
        <label for="role" class="form-label">Role</label>
        <select id="role" name="role" class="form-select">
            <option value="student">Student</option>
            <option value="instructor">Instructor</option>
        </select>
    </div>
    <button class="btn btn-primary w-100" type="submit">Register</button>
</form>

<div class="auth-secondary">
    <span>Already registered?</span>
    <a href="{{ url_for('auth.login') }}">Log in</a>
</div>
{% endblock %}
