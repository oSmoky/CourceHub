{% extends "auth/base.html" %}

{% block title %}Login - CourseHub{% endblock %}

{% block content %}
<div class="auth-copy">
    <h1 id="auth-title">Login</h1>
    <p>Sign in to manage courses, lessons, and learning progress.</p>
</div>

<form method="post" class="auth-form">
    <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input id="email" name="email" type="email" class="form-control" required autofocus autocomplete="email">
    </div>
    <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input id="password" name="password" type="password" class="form-control" required autocomplete="current-password">
    </div>
    <button class="btn btn-primary w-100" type="submit">Login</button>
</form>

<div class="auth-secondary">
    <span>Need an account?</span>
    <a href="{{ url_for('auth.register') }}">Create one</a>
</div>
{% endblock %}
